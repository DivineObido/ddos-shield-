services:

  nginx:
    image: nginx:alpine
    container_name: hng-nginx
    ports:
      - "80:80"
    volumes:
      # Mount our nginx.conf into the container, overriding the default.
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

      # Mount the shared log volume. Nginx writes logs here.
      - hng-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    restart: unless-stopped
    networks:
      - hng-network

  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    container_name: hng-nextcloud

    volumes:
      - hng-nginx-logs:/var/log/nginx:ro
      - nextcloud-data:/var/www/html
    restart: unless-stopped
    networks:
      - hng-network

  detector:
    build:
      # Docker will look for a Dockerfile in the ./detector folder
      # and build the image from it.
      context: ./detector
    container_name: hng-detector
    ports:
      - "8080:8080"
    volumes:
      # Read-only access to the shared log volume.
      - hng-nginx-logs:/var/log/nginx:ro

      # A separate volume for the detector's own audit logs.
      - detector-logs:/var/log/detector
    cap_add:
      - NET_ADMIN
    network_mode: host
      # The detector uses host networking instead of the Docker
      # internal network.
    restart: unless-stopped
    depends_on:
      - nginx

volumes:
  hng-nginx-logs:
    name: HNG-nginx-logs

  nextcloud-data:
    # Nextcloud user data. Persistent storage for the application.

  detector-logs:
    # Audit logs from the detector daemon.

networks:
  hng-network:
    driver: bridge